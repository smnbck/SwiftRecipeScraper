name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Run tests
        run: swift test

  build_ios:
    name: Build (iOS Simulator)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build SwiftRecipeScraper for iOS Simulator
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/clang-module-cache"
          export CLANG_MODULE_CACHE_PATH="$RUNNER_TEMP/clang-module-cache"

          ARCH="$(uname -m)"
          if [[ "$ARCH" == "x86_64" ]]; then
            DEST_ARCH="x86_64"
          else
            DEST_ARCH="arm64"
          fi

          cat > "$RUNNER_TEMP/ios-sim-destination.json" <<JSON
          {
            "version": 1,
            "sdk": "iphonesimulator",
            "platform": "iOS",
            "arch": "${DEST_ARCH}"
          }
          JSON

          echo "ARCH=$ARCH"
          echo "DEST_ARCH=$DEST_ARCH"

          swift build --product SwiftRecipeScraper --destination "$RUNNER_TEMP/ios-sim-destination.json"

