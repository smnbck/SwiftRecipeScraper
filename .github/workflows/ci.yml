name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Run tests
        run: swift test

  build_ios:
    name: Build (iOS Simulator)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build SwiftRecipeScraper for iOS Simulator
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/clang-module-cache"
          export CLANG_MODULE_CACHE_PATH="$RUNNER_TEMP/clang-module-cache"

          ARCH="$(uname -m)"
          if [[ "$ARCH" == "x86_64" ]]; then
            TRIPLE="x86_64-apple-ios15.0-simulator"
          else
            TRIPLE="arm64-apple-ios15.0-simulator"
          fi

          SDKROOT="$(xcrun --sdk iphonesimulator --show-sdk-path)"
          echo "ARCH=$ARCH"
          echo "TRIPLE=$TRIPLE"
          echo "SDKROOT=$SDKROOT"

          swift build \
            --product SwiftRecipeScraper \
            --triple "$TRIPLE" \
            -Xswiftc -sdk -Xswiftc "$SDKROOT"

